name: build-tvos

on:
  push:
    tags: ['*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches dawn-version
        id: ver
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="$(tr -d '[:space:]' < dawn-version)"
          tag_stripped="${tag#v}"
          if [[ "${tag_stripped}" != "${version}" ]]; then
            echo "ERROR: tag '${tag}' does not match dawn-version '${version}'" >&2
            echo "       (compared as '${tag_stripped}' vs '${version}')" >&2
            exit 1
          fi
          echo "tag '${tag}' matches dawn-version '${version}'"
          echo "dawn_version=${version}" >> "$GITHUB_OUTPUT"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode + tvOS SDKs
        run: |
          xcodebuild -version
          xcrun --sdk appletvos --show-sdk-path
          xcrun --sdk appletvsimulator --show-sdk-path

      - name: Install build dependencies
        run: brew install cmake ninja

      - name: Cache depot_tools + Dawn source + ios-cmake
        uses: actions/cache@v4
        with:
          path: |
            .cache/depot_tools
            .cache/dawn-${{ steps.ver.outputs.dawn_version }}
            .cache/ios-cmake-*.cmake
          key: dawn-tvos-${{ steps.ver.outputs.dawn_version }}

      - name: Build (Debug + Release)
        run: ./build-tools/tvos/build.sh

      - name: Package release tarballs
        run: |
          set -euo pipefail
          version="${{ steps.ver.outputs.dawn_version }}"
          mkdir -p release
          for bt in debug release; do
              stage="dawn-tvos-${bt}-${version}"
              tar -C "build-tvos-${bt}" -czf "release/${stage}.xcframework.tar.gz" \
                  webgpu_dawn.xcframework
          done
          ls -la release/

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: webgpu_dawn-tvos-${{ steps.ver.outputs.dawn_version }}
          path: release/*.tar.gz
          if-no-files-found: error

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.tar.gz
          fail_on_unmatched_files: true
