name: build-x86_64

on:
  push:
    tags: ['*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches dawn-version
        id: ver
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="$(tr -d '[:space:]' < dawn-version)"
          tag_stripped="${tag#v}"
          if [[ "${tag_stripped}" != "${version}" ]]; then
            echo "ERROR: tag '${tag}' does not match dawn-version '${version}'" >&2
            echo "       (compared as '${tag_stripped}' vs '${version}')" >&2
            exit 1
          fi
          echo "tag '${tag}' matches dawn-version '${version}'"
          echo "dawn_version=${version}" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build python3 git ca-certificates pkg-config \
            libwayland-dev wayland-protocols libwayland-bin \
            libxkbcommon-dev libx11-dev libx11-xcb-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libxext-dev libxcb1-dev \
            libvulkan-dev mesa-common-dev

      - name: Cache depot_tools + Dawn source
        uses: actions/cache@v4
        with:
          path: |
            .cache/depot_tools
            .cache/dawn-${{ steps.ver.outputs.dawn_version }}
          key: dawn-x86_64-${{ steps.ver.outputs.dawn_version }}

      - name: Build (Debug + Release)
        run: ./build-tools/x86_64/build.sh

      - name: List release tarballs
        run: ls -la release/

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libwebgpu_dawn-x86_64-${{ steps.ver.outputs.dawn_version }}
          path: release/*.tar.gz
          if-no-files-found: error

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.tar.gz
          fail_on_unmatched_files: true
